<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dotmelk — مقایسه املاک / موبایل</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap");
      :root {
        --primary: #6d28d9; --primary-hover: #5b21b6; --primary-soft: #f5f3ff; --primary-subtle: #ede9fe; --primary-border: #c4b5fd;
        --bg: #f8fafc; --surface: #ffffff; --surface-muted: #f1f5f9;
        --text: #0f172a; --text-2: #475569; --muted: #64748b; --subtle: #94a3b8;
        --border: #e2e8f0; --border-strong: #cbd5e1;
        --success: #16a34a; --success-soft: #dcfce7; --success-text: #166534;
        --warning: #d97706; --warning-soft: #fef3c7; --warning-text: #92400e;
        --danger: #dc2626; --danger-soft: #fee2e2; --danger-text: #991b1b;
        --info: #2563eb; --info-soft: #dbeafe; --info-text: #1e40af; --teal: #0f766e; --teal-soft: #ccfbf1; --orange: #ea580c; --orange-soft: #ffedd5;
        --t-sale: #2563eb; --t-rent: #16a34a; --t-participation: #ea580c; --t-presell: #dc2626; --t-short: #0d9488;
        --shadow-sm: 0 4px 12px rgba(15, 23, 42, 0.06); --shadow-md: 0 10px 24px rgba(15, 23, 42, 0.08);
      }
      * { box-sizing: border-box; }
      html { overflow-x: hidden; }
      body { margin: 0; font-family: "Vazirmatn", system-ui, sans-serif; background: var(--bg); color: var(--text); direction: rtl; min-height: 100vh; overflow-x: hidden; }
      a { text-decoration: none; color: inherit; }
      button { border: 0; cursor: pointer; background: none; color: inherit; font: inherit; }
      .topbar { position: sticky; top: 0; z-index: 20; background: rgba(248, 250, 252, 0.92); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
      .icon-btn { width: 40px; height: 40px; border-radius: 13px; border: 1px solid var(--border); background: #fff; display: grid; place-items: center; color: var(--text-2); font-size: 19px; flex: 0 0 auto; }
      .topbar h1 { margin: 0; font-size: 17px; font-weight: 900; flex: 1; }
      .topbar .clear { font-size: 12px; font-weight: 800; color: var(--danger); }
      .content { padding: 14px 16px 30px; }
      .intro { font-size: 13px; color: var(--text-2); line-height: 21px; margin: 0 0 14px; }

      .type-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 900; padding: 3px 8px; border-radius: 999px; color: #fff; }
      .type-tag.sale { background: var(--t-sale); } .type-tag.rent { background: var(--t-rent); } .type-tag.participation { background: var(--t-participation); } .type-tag.presell { background: var(--t-presell); } .type-tag.short { background: var(--t-short); }

      .cmp-scroll { overflow-x: auto; border: 1px solid var(--border); border-radius: 18px; background: var(--surface); box-shadow: var(--shadow-sm); }
      .cmp { border-collapse: collapse; width: 100%; }
      .cmp th, .cmp td { border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); padding: 10px 11px; text-align: right; vertical-align: middle; }
      .cmp th:last-child, .cmp td:last-child { border-left: 0; }
      .cmp tr:last-child th, .cmp tr:last-child td { border-bottom: 0; }
      .row-label { width: 92px; min-width: 92px; font-size: 11px; font-weight: 800; color: var(--text-2); background: var(--surface-muted); position: sticky; right: 0; z-index: 2; }
      .col-head { background: linear-gradient(180deg, var(--primary-soft), #fff); vertical-align: top; min-width: 158px; }
      .ch-thumb { height: 80px; border-radius: 12px; position: relative; overflow: hidden; margin-bottom: 9px; background: linear-gradient(135deg, #dbeafe, #ede9fe 60%, #f8fafc); }
      .ch-thumb.rent { background: linear-gradient(135deg, #d1fae5, #dbeafe 60%, #f8fafc); }
      .ch-thumb.participation { background: linear-gradient(135deg, #ffedd5, #fde68a 60%, #f8fafc); }
      .ch-thumb.presell { background: linear-gradient(135deg, #fee2e2, #ede9fe 60%, #f8fafc); }
      .ch-thumb.short { background: linear-gradient(135deg, #ccfbf1, #dbeafe 60%, #f8fafc); }
      .ch-thumb .rm { position: absolute; top: 6px; left: 6px; width: 26px; height: 26px; border-radius: 999px; background: rgba(255, 255, 255, 0.92); display: grid; place-items: center; color: var(--danger); font-size: 15px; }
      .ch-title { font-size: 12px; font-weight: 900; line-height: 18px; margin: 7px 0 0; }
      .price-cell { font-size: 13px; font-weight: 900; }
      .price-cell small { font-size: 11px; color: var(--muted); font-weight: 700; }
      .price-cell .label { font-size: 10px; color: var(--muted); font-weight: 800; }
      .price-cell .sep { display: inline-block; width: 1px; height: 11px; background: var(--border-strong); margin: 0 5px; vertical-align: middle; }
      .price-cell .agreed { color: var(--primary); }
      .bar-cell { display: flex; align-items: center; gap: 7px; }
      .bar-cell .track { flex: 1; height: 6px; border-radius: 999px; background: var(--surface-muted); overflow: hidden; }
      .bar-cell .fill { display: block; height: 100%; border-radius: 999px; }
      .bar-cell .val { font-size: 11px; font-weight: 900; width: 24px; color: var(--text-2); flex: 0 0 auto; }
      .fill.p { background: var(--primary); } .fill.g { background: var(--teal); }
      .fill.tier-exc { background: var(--success); } .fill.tier-good { background: var(--info); } .fill.tier-fair { background: var(--warning); } .fill.tier-risk { background: var(--danger); }
      .tierbadge { font-size: 10px; font-weight: 900; padding: 3px 8px; border-radius: 999px; white-space: nowrap; }
      .tierbadge.tier-exc { background: var(--success-soft); color: var(--success-text); }
      .tierbadge.tier-good { background: var(--info-soft); color: var(--info-text); }
      .tierbadge.tier-fair { background: var(--warning-soft); color: var(--warning-text); }
      .tierbadge.tier-risk { background: var(--danger-soft); color: var(--danger-text); }
      .best:after { content: "بهترین"; position: absolute; top: 4px; right: 6px; font-size: 8px; font-weight: 900; color: var(--success-text); background: var(--success-soft); padding: 2px 5px; border-radius: 999px; z-index: 2; }
      .col-head { position: relative; }
      .detail-btn { display: block; margin-top: 8px; height: 32px; border-radius: 10px; background: var(--primary); color: #fff; font-size: 11px; font-weight: 800; text-align: center; line-height: 32px; }

      .cmp tr.grp th { background: linear-gradient(120deg, var(--primary), var(--primary-hover)); color: #fff; text-align: right; padding: 9px 11px; cursor: pointer; border-left: 0; }
      .cmp tr.grp .gc { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 900; }
      .cmp tr.grp .gchev { margin-inline-start: auto; transition: 0.2s; }
      .cmp tr.grp.collapsed .gchev { transform: rotate(-90deg); }
      .ck { display: inline-grid; place-items: center; width: 22px; height: 22px; border-radius: 999px; font-size: 11px; font-weight: 900; }
      .ck.yes { background: var(--success-soft); color: var(--success-text); }
      .ck.no { background: var(--surface-muted); color: var(--subtle); }
      .muted-cell { color: var(--subtle); }
      .row-hidden { display: none; }
      .empty { padding: 70px 24px; text-align: center; }
      .empty .ic { width: 64px; height: 64px; border-radius: 20px; background: var(--primary-soft); color: var(--primary); display: grid; place-items: center; font-size: 28px; margin: 0 auto 16px; }
      .empty h2 { font-size: 18px; font-weight: 900; margin: 0 0 8px; }
      .empty p { color: var(--muted); font-size: 13px; margin: 0 0 16px; }
      .btn { height: 46px; padding: 0 20px; border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-weight: 900; font-size: 14px; background: var(--primary); color: #fff; }

      /* ===== overall score in column header ===== */
      .ch-score { display: flex; align-items: center; gap: 8px; margin: 8px 0 9px; padding: 8px 10px; background: var(--surface-muted); border-radius: 12px; }
      .ch-gauge { width: 44px; height: 44px; border-radius: 50%; display: grid; place-items: center; position: relative; flex: 0 0 auto; }
      .ch-gauge::before { content: ''; position: absolute; inset: 5px; border-radius: 50%; background: #fff; }
      .ch-gauge .gn { position: relative; z-index: 1; font-size: 11px; font-weight: 900; }
      .ch-score-info .tl { font-size: 11px; font-weight: 900; }
      .ch-score-info .rl { font-size: 10px; color: var(--muted); font-weight: 700; margin-top: 2px; }

      /* ===== category score row in each group ===== */
      .cat-score-row td { background: var(--surface-muted); }
      .cat-score-row .cs-label { color: var(--primary); background: var(--primary-soft) !important; font-size: 10px; }
      .cat-score-cell { display: flex; align-items: center; gap: 5px; }
      .cat-score-cell .cst { flex: 1; height: 6px; border-radius: 999px; background: var(--border); overflow: hidden; }
      .cat-score-cell .csf { display: block; height: 100%; border-radius: 999px; }
      .cat-score-cell .csn { font-size: 11px; font-weight: 900; flex: 0 0 auto; width: 22px; text-align: left; }
      .cat-score-cell .csp { font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 999px; flex: 0 0 auto; white-space: nowrap; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="icon-btn" href="ads.html" aria-label="بازگشت">›</a>
      <h1>مقایسه‌ی املاک</h1>
      <button class="clear" onclick="clearAll()">پاک کردن همه</button>
    </header>
    <div class="content">
      <p class="intro">املاک انتخاب‌شده بر اساس قیمت، مشخصات و ارزیابی محیطی داتملک. برای دیدن همه‌ی ستون‌ها به چپ بکشید.</p>
      <div id="cmpWrap"></div>
    </div>

    <script src="../assets/dotmelk-ads-data.js?v=4"></script>
    <script>
      let keys = JSON.parse(localStorage.getItem("dm_compare") || "[]");
      if (!keys.length) keys = ["a1", "a2", "a4"];
      let items = keys.map(k => DM_ADS.find(a => a.key === k)).filter(Boolean);

      function removeItem(key) { keys = keys.filter(k => k !== key); localStorage.setItem("dm_compare", JSON.stringify(keys)); items = keys.map(k => DM_ADS.find(a => a.key === k)).filter(Boolean); render(); }
      function clearAll() { keys = []; localStorage.setItem("dm_compare", "[]"); items = []; render(); }

      function groupScore(g, a) {
        const n = g.t;
        if (n === "آگهی‌دهنده") return null;
        if (n === "ارزیابی محیطی داتملک") return a.score;
        if (n === "قیمت و پرداخت") return a.a[2];
        if (n === "دسترسی‌ها") return a.a[3];
        if (n === "امکانات واحد") return a.a[0];
        if (n === "مشاعات ساختمان") return Math.round((a.a[0] + a.a[1]) / 2);
        if (n === "مشخصات ساختمان") return a.a[1];
        if (n === "حیاط") return Math.round((a.a[1] + a.a[4]) / 2);
        return Math.round((a.a[0] + a.a[1] + a.a[2]) / 3);
      }

      function render() {
        const wrap = document.getElementById("cmpWrap");
        if (!items.length) { wrap.innerHTML = `<div class="empty"><div class="ic">⇄</div><h2>لیست مقایسه خالی است</h2><p>از صفحه‌ی آگهی‌ها چند ملک اضافه کنید.</p><a class="btn" href="ads.html">رفتن به آگهی‌ها</a></div>`; return; }
        let bestIdx = 0; items.forEach((a, i) => { if (a.score > items[bestIdx].score) bestIdx = i; });

        const colHead = items.map((a, i) => {
          const t = DM_tier(a.score);
          return `<th class="col-head ${i === bestIdx ? "best" : ""}">
            <div class="ch-thumb ${a.type}"><button class="rm" onclick="removeItem('${a.key}')">×</button></div>
            <span class="type-tag ${a.type}">${a.typeLabel}</span>
            <h3 class="ch-title">${a.title}</h3>
            <div class="ch-score">
              <div class="ch-gauge" style="background:conic-gradient(${t.color} calc(${a.score} * 1%),var(--surface-muted) 0)">
                <span class="gn" style="color:${t.color}">${DM_fa(a.score)}</span>
              </div>
              <div class="ch-score-info">
                <div class="tl" style="color:${t.text}">${t.l}</div>
                <div class="rl">${t.risk}</div>
              </div>
            </div>
            <a class="detail-btn" href="property-detail.html?key=${a.key}">جزئیات</a>
          </th>`;
        }).join("");

        function cell(a, row) {
          const kind = row[2];
          if (kind === "dim") {
            const v = a.a[row[1]], grp = DM_DIMS[row[1]][1], bv = Math.max(...items.map(x => x.a[row[1]]));
            return `<div class="bar-cell"><span class="track"><span class="fill ${grp}" style="width:${v}%"></span></span><span class="val" style="${v === bv ? "color:var(--success-text)" : ""}">${DM_fa(v)}</span></div>`;
          }
          if (kind === "tier") {
            const t = DM_tier(a.score);
            return `<span class="tierbadge" style="background:${t.soft};color:${t.text}">${t.l} · ${DM_fa(a.score)}</span>`;
          }
          let v = row[1][0] === "@" ? a[row[1].slice(1)] : (a.cmp ? a.cmp[row[1]] : undefined);
          if (kind === "bool") return v ? '<span class="ck yes">✓</span>' : '<span class="ck no">✕</span>';
          if (v == null || v === "" || v === "—") return '<span class="muted-cell">—</span>';
          if (kind === "m") v = v + " متر";
          return v;
        }

        let rows = `<tr><th class="row-label">ملک</th>${colHead}</tr>`;
        DM_CMP_GROUPS.forEach((g, gi) => {
          rows += `<tr class="grp" onclick="toggleGroup(${gi})"><th colspan="${items.length + 1}"><div class="gc"><span>${g.ic} ${g.t}</span><span class="gchev">▾</span></div></th></tr>`;
          g.rows.forEach(row => {
            rows += `<tr class="r r-g${gi}"><th class="row-label">${row[0]}</th>${items.map(a => `<td>${cell(a, row)}</td>`).join("")}</tr>`;
          });
          const hasScore = groupScore(g, items[0]) !== null;
          if (hasScore) {
            rows += `<tr class="r r-g${gi} cat-score-row">
              <th class="row-label cs-label">امتیاز دسته</th>
              ${items.map(a => {
                const gs = groupScore(g, a);
                const gt = DM_tier(gs);
                return `<td><div class="cat-score-cell">
                  <span class="cst"><span class="csf" style="width:${gs}%;background:${gt.color}"></span></span>
                  <span class="csn" style="color:${gt.text}">${DM_fa(gs)}</span>
                  <span class="csp" style="background:${gt.soft};color:${gt.text}">${gt.l}</span>
                </div></td>`;
              }).join("")}
            </tr>`;
          }
        });
        wrap.innerHTML = `<div class="cmp-scroll"><table class="cmp">${rows}</table></div>`;
      }
      window.toggleGroup = function (gi) {
        const hdr = document.querySelectorAll(".cmp tr.grp")[gi];
        if (!hdr) return;
        hdr.classList.toggle("collapsed");
        const on = hdr.classList.contains("collapsed");
        document.querySelectorAll(".r-g" + gi).forEach(r => r.classList.toggle("row-hidden", on));
      };
      render();
    </script>
  </body>
</html>
