<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Dotmelk — ورود / موبایل</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap");
      :root {
        --primary: #6d28d9; --primary-hover: #5b21b6; --primary-soft: #f5f3ff; --primary-subtle: #ede9fe; --primary-border: #c4b5fd;
        --bg: #f8fafc; --surface: #ffffff; --surface-muted: #f1f5f9; --text: #0f172a; --text-2: #475569; --muted: #64748b; --subtle: #94a3b8;
        --border: #e2e8f0; --border-strong: #cbd5e1;
      }
      * { box-sizing: border-box; }
      html, body { overflow-x: hidden; }
      body { margin: 0; min-height: 100dvh; font-family: "Vazirmatn", system-ui, -apple-system, "Segoe UI", sans-serif; color: var(--text); direction: rtl; background: var(--surface); display: flex; flex-direction: column; }
      a { text-decoration: none; color: inherit; }
      button, input { font: inherit; }
      button { border: 0; cursor: pointer; background: none; color: inherit; }

      .hero { position: relative; overflow: hidden; color: #fff; padding: 32px 22px 28px; background: linear-gradient(150deg, #4c1d95, #6d28d9 62%, #5b21b6); border-radius: 0 0 34px 34px; flex: 0 0 auto; }
      .hero .grid-motif { position: absolute; inset: -10%; opacity: 0.32; background: linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px), linear-gradient(0deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px); background-size: 36px 36px; transform: rotate(-6deg); }
      .hero .glow { position: absolute; width: 260px; height: 260px; border-radius: 50%; background: radial-gradient(circle, rgba(255, 255, 255, 0.18), transparent 70%); top: -100px; left: -60px; }
      .hero .glow2 { position: absolute; width: 160px; height: 160px; border-radius: 50%; background: radial-gradient(circle, rgba(139, 92, 246, 0.3), transparent 70%); bottom: -40px; right: -20px; }
      .hero-logo { position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; }
      .hero-logo .lm { width: 62px; height: 62px; border-radius: 21px; background: rgba(255, 255, 255, 0.18); display: grid; place-items: center; font-size: 30px; font-weight: 800; box-shadow: 0 8px 24px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.25); }
      .hero-logo .lm:before { content: "⌖"; }
      .hero-logo b { font-size: 23px; font-weight: 900; letter-spacing: -0.02em; }
      .hero-logo span { font-size: 12px; opacity: 0.82; font-weight: 500; }
      /* feature chips */
      .hero-feats { position: relative; display: flex; gap: 7px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
      .hf { background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.22); color: rgba(255,255,255,0.95); border-radius: 999px; padding: 5px 12px; font-size: 11px; font-weight: 800; display: inline-flex; align-items: center; gap: 5px; }

      .content { flex: 1; padding: 28px 22px 0; display: flex; flex-direction: column; }
      h1 { font-size: 22px; line-height: 34px; font-weight: 900; margin: 0 0 5px; letter-spacing: -0.02em; }
      .sub { font-size: 14px; line-height: 24px; color: var(--text-2); margin: 0 0 24px; }
      .label { font-size: 13px; font-weight: 800; color: var(--text-2); margin-bottom: 8px; display: block; }
      .phone-field { display: flex; align-items: center; height: 56px; border: 1.5px solid var(--border); border-radius: 16px; background: #fff; padding: 0 6px 0 14px; gap: 10px; transition: 0.15s; box-shadow: 0 2px 8px rgba(15,23,42,0.04); }
      .phone-field:focus-within { border-color: var(--primary-border); box-shadow: 0 0 0 4px rgba(109, 40, 217, 0.1), 0 2px 8px rgba(15,23,42,0.04); }
      .cc { display: flex; align-items: center; gap: 6px; height: 44px; padding: 0 12px; border-radius: 12px; background: var(--surface-muted); font-size: 13px; font-weight: 900; flex: 0 0 auto; color: var(--text-2); }
      .phone-field input { flex: 1; border: 0; outline: 0; background: transparent; font-size: 19px; font-weight: 800; color: var(--text); direction: ltr; text-align: left; letter-spacing: 1.5px; min-width: 0; }
      .phone-field input::placeholder { color: var(--subtle); font-weight: 600; letter-spacing: 0; font-size: 16px; }

      .btn { width: 100%; height: 54px; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; font-weight: 900; }
      .btn:active { transform: scale(0.985); }
      .btn-primary { background: linear-gradient(135deg, #7c3aed, #5b21b6); color: #fff; box-shadow: 0 16px 36px rgba(109, 40, 217, 0.28); margin-top: 20px; }
      .btn-outline { background: #fff; color: var(--text-2); border: 1.5px solid var(--border); font-weight: 800; }
      .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; color: var(--subtle); font-size: 12px; font-weight: 800; }
      .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

      .terms { font-size: 12px; line-height: 22px; color: var(--muted); margin-top: 20px; text-align: center; }
      .terms a { color: var(--primary); font-weight: 800; }
      .foot { margin-top: auto; padding: 16px 0 calc(20px + env(safe-area-inset-bottom)); text-align: center; font-size: 12px; color: var(--subtle); border-top: 1px solid var(--border); margin-top: 20px; }
      .foot a { color: var(--primary); font-weight: 800; }
    </style>
  </head>
  <body>
    <header class="hero">
      <span class="grid-motif"></span>
      <span class="glow"></span>
      <span class="glow2"></span>
      <div class="hero-logo">
        <span class="lm"></span>
        <b>داتملک</b>
        <span>پلتفرم ملکی مبتنی بر نقشه</span>
      </div>
      <div class="hero-feats">
        <span class="hf">⌖ نقشه هوشمند</span>
        <span class="hf">✓ ارزیابی ملک</span>
        <span class="hf">◌ چت مستقیم</span>
      </div>
    </header>

    <main class="content">
      <h1>ورود یا ثبت‌نام</h1>
      <p class="sub">شماره موبایل خود را وارد کنید تا کد تأیید پیامک شود.</p>

      <label class="label" for="phone">شماره موبایل</label>
      <div class="phone-field">
        <span class="cc">🇮🇷 ۹۸+</span>
        <input id="phone" inputmode="numeric" maxlength="11" placeholder="۹۱۲ ۳۴۵ ۶۷۸۹" autocomplete="tel" />
      </div>

      <a class="btn btn-primary" href="otp.html">دریافت کد تأیید</a>
      <div class="divider">یا</div>
      <a class="btn btn-outline" href="ads.html">ادامه بدون ثبت‌نام</a>

      <p class="terms">با ورود، <a href="rules.html">قوانین</a> و <a href="rules.html">حریم خصوصی</a> داتملک را می‌پذیرید.</p>

      <div class="foot">مشکلی در ورود دارید؟ <a href="contact.html">ارتباط با پشتیبانی</a></div>
    </main>

    <script>
      const p = document.getElementById("phone");
      p.addEventListener("input", () => { p.value = p.value.replace(/[^0-9۰-۹]/g, ""); });
    </script>
  </body>
</html>
