<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>خروج از داتملک</title>
<link rel="stylesheet" href="../assets/dotmelk-menu-pages.css"/>
<script defer src="../assets/dotmelk-menu-pages.js"></script>
<style>
.logout-avatar{width:72px;height:72px;border-radius:24px;background:linear-gradient(135deg,#7C3AED,#5B21B6);display:grid;place-items:center;color:#fff;font-size:28px;font-weight:900;margin:0 auto 16px;box-shadow:0 8px 24px rgba(109,40,217,.2)}
.logout-name{font-size:17px;font-weight:900;text-align:center;margin-bottom:4px}
.logout-role{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px}
.logout-divider{height:1px;background:var(--border);margin:0 -24px 20px}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <a class="brand" href="ads.html"><div class="logo-mark"></div><div><div class="brand-title">داتملک</div><div class="brand-subtitle">خروج از حساب</div></div></a>
    <div class="top-actions">
      <a class="btn btn-outline" href="my-dotmelk.html">← بازگشت</a>
    </div>
  </header>

  <section class="logout-card">
    <div class="logout-avatar">م</div>
    <div class="logout-name">مهراد محمدی</div>
    <div class="logout-role">مشاور · آژانس آسمان · اشتراک Pro</div>
    <div class="logout-divider"></div>
    <div class="icon" style="font-size:36px;margin-bottom:12px">⎋</div>
    <h1 style="font-size:20px;line-height:32px;margin:0 0 8px;font-weight:900">خروج از داتملک</h1>
    <p style="font-size:13px;color:var(--muted);margin:0 0 22px;line-height:22px">آیا از خروج از حساب کاربری مطمئنید؟<br/>جلسه فعلی پایان می‌یابد و باید دوباره وارد شوید.</p>
    <div style="display:flex;gap:10px;justify-content:center">
      <a class="btn btn-outline" href="my-dotmelk.html" style="height:44px;min-width:120px;font-size:14px">انصراف</a>
      <button class="btn btn-danger" style="height:44px;min-width:120px;font-size:14px" data-toast="در نسخه دمو، خروج نمایشی است">خروج</button>
    </div>
    <p style="font-size:11px;color:var(--subtle);margin:18px 0 0;text-align:center">برای خروج از همه دستگاه‌ها به تنظیمات امنیت در <a href="account.html" style="color:var(--primary)">حساب کاربری</a> بروید</p>
  </section>
</div>
<div class="prototype-ribbon">Dotmelk · Desktop · خروج</div>
</body>
</html>
